    .menu-container {
      display: flex;

    }

    .menu-item {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .menu-item:hover {
      transform: scale(1.05);
    }

    .menu-item img {

      height: 180px;

    }

    .menu-content {

    }

  }

  .navbar a {

  }

}
