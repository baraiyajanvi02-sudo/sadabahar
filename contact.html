<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                  url('bg.jpg');  /* same background image */
      background-size: cover;
      background-position: center;
    }

    /* Navbar */
    .navbar {
      background:#832f16;
      padding: 15px;
      text-align: center;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 18px;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    /* Contact Box */
    .contact-box {
      background: rgba(255,255,255,0.95);
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    .contact-box h1 {
      color: #832f16;
      margin-bottom: 20px;
    }

    .contact-box input,
    .contact-box textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #7e5c4a;
      border-radius: 8px;
      font-size: 15px;
    }

    .contact-box button {
      background:#832f16;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
            body {
    background-color: #7e5c4a;
    color: white;
}




    .contact-box button:hover {
      background: #832f16;
    }
    @media (max-width: 768px) {

  .menu-container {
    flex-direction: column;
    align-items: center;
  }

  .about-box, .contact-box {
    width: 90%;
    margin: 20px auto;
  }

  .navbar a {
    display: block;
    margin: 10px 0;
  }

}
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <a href="navbar.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- Contact Form -->
  <div class="contact-box">
    <h1>Contact Us</h1>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="4" placeholder="Your Message"></textarea>

    <button>Send Message</button>
  </div>

</body>
</html>
